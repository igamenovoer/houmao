schema_version = 1
baseline_commit = "8f377c468bc7f87ff40dbf40c0a68327616112bd"
baseline_file_inventory = "pre-compaction-files.txt"
permitted_deltas = [
  "static source ownership",
  "standalone versus parent-scoped entrypoint role",
  "actor-frame intake and eligibility",
  "explicit sibling-qualified routing",
  "scanner-safe SKILL-MAIN.md child entrypoints",
  "Imsight structural normalization",
]

[[ownership_rules]]
source_prefix = "src/houmao/agents/assets/system_skills/houmao-agent-loop-pro/"
target_prefix = "src/houmao/agents/assets/system_skills/public/houmao-agent-loop-pro/"
reason = "The manually invoked pro loop remains standalone; all support resources retain local ownership."

[[ownership_rules]]
source_prefix = "src/houmao/agents/assets/system_skills/houmao-agent-loop-lite/"
target_prefix = "src/houmao/agents/assets/system_skills/public/houmao-agent-loop-lite/"
reason = "The manually invoked lite loop remains standalone; all support resources retain local ownership."

[[ownership_rules]]
source_prefix = "src/houmao/agents/assets/system_skills/houmao-touring/"
target_prefix = "src/houmao/agents/assets/system_skills/public/houmao-admin-welcome/"
reason = "Touring becomes the independent read-only admin welcome; branch content is consolidated into owned command and reference pages."

[[ownership_rules]]
source_prefix = "src/houmao/agents/assets/system_skills/houmao-specialist-mgr/"
target_prefix = "src/houmao/agents/assets/system_skills/public/houmao-shared-routines/subskills/houmao-agent-definition/"
reason = "The wrapper owns no executable resources; specialist-mgr remains an admin/direct-admin route alias to canonical agent-definition."

[[ownership_rules]]
source_prefix = "src/houmao/agents/assets/system_skills/houmao-"
target_prefix = "src/houmao/agents/assets/system_skills/public/houmao-shared-routines/subskills/<source-skill>/"
reason = "Each of the other sixteen flat skills becomes one parent-scoped child and retains its complete private resource tree."

[[normalization_rules]]
source_pattern = "<ordinary-skill>/SKILL.md"
target_pattern = "houmao-shared-routines/subskills/<ordinary-skill>/SKILL-MAIN.md"
reason = "Role-canonical parent-scoped entrypoint; no compatibility SKILL.md is retained."

[[normalization_rules]]
source_pattern = "<ordinary-skill>/actions/*.md"
target_pattern = "houmao-shared-routines/subskills/<ordinary-skill>/commands/*.md"
reason = "Imsight names executable peer routines commands; operation names and behavior remain unchanged."

[[normalization_rules]]
source_pattern = "<ordinary-skill>/subskills/<procedure>.md"
target_pattern = "houmao-shared-routines/subskills/<ordinary-skill>/commands/<procedure>.md or references/<procedure>.md"
reason = "Procedure-only pages do not own resource roots and become command or reference pages without changing their contract."

[[skills]]
source = "houmao-adv-usage-pattern"
target = "houmao-shared-routines->houmao-adv-usage-pattern"
activation = "Supported explicit advanced workflow composition; not a generic loop trigger."
operations = ["help", "self-notification", "notifier-prompt-driven-mail-loop", "pairwise-edge-loop", "relay-loop"]
aliases = ["pairwise edge-loop=pairwise-edge-loop", "pairwise-edge-loop-via-gateway-and-mailbox=pairwise-edge-loop", "relay-loop-via-gateway-and-mailbox=relay-loop"]
inputs = ["selected pattern", "managed agents", "gateway or mailbox context"]
outputs = ["bounded composed workflow result"]
gates = ["choose only a supported pattern", "use pro or lite only when explicitly selected"]
blockers = ["unsupported pattern", "missing gateway or mailbox facts"]
evidence_handoffs = ["selected child workflow returns bounded results to the composed pattern"]
target_rules = ["operate only on the managed agents named by the selected pattern"]
side_effects = ["the selected pattern may send prompts, mail, reminders, or loop triggers"]
stop_conditions = ["stop at the selected pattern boundary"]
help_read_only = true

