aliases = ["presets=recipes", "specialist-mgr=agent-definition"]
inputs = ["project or internal root", "definition kind", "name", "credential references", "launcher choice"]
outputs = ["definition records", "config drafts", "launch command or lifecycle handoff"]
gates = ["credential-kind boundary", "launcher precedence", "missing required profile inputs", "foreground gateway posture"]
blockers = ["missing or conflicting definition inputs", "unsupported credential reference"]
evidence_handoffs = ["launch and stop work hands off to agent-instance"]
target_rules = ["write definitions only under the selected project or internal root"]
side_effects = ["create or update definitions and config drafts; launch or stop only through explicit lifecycle operations"]
stop_conditions = ["fast-forward stops before launch", "easy lifecycle hands broad follow-up to agent-instance"]
help_read_only = true

