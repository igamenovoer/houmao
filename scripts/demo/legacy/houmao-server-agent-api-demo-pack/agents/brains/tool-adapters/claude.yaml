schema_version: 1
tool: claude
home_selector:
  env_var: CLAUDE_CONFIG_DIR
launch:
  executable: claude
  args: []
  default_tool_params: {}
  metadata:
    tool_params:
      include_partial_messages:
        type: boolean
        backends:
          claude_headless:
            args_when_true:
              - --include-partial-messages
  env_injection:
    mode: export_from_env_file
config_projection:
  destination: .
skills_projection:
  destination: skills
  mode: symlink
credential_projection:
  files_dir: files
  file_mappings:
    - source: claude_state.template.json
      destination: claude_state.template.json
      mode: copy
      required: false
  env:
    source: env/vars.env
    allowlist:
      - ANTHROPIC_API_KEY
      - ANTHROPIC_AUTH_TOKEN
      - ANTHROPIC_BASE_URL
      - ANTHROPIC_MODEL
      - ANTHROPIC_SMALL_FAST_MODEL
      - CLAUDE_CODE_SUBAGENT_MODEL
      - ANTHROPIC_DEFAULT_OPUS_MODEL
      - ANTHROPIC_DEFAULT_SONNET_MODEL
      - ANTHROPIC_DEFAULT_HAIKU_MODEL
