schema_version: 1
tool: kimi
home_selector:
  env_var: KIMI_CODE_HOME
launch:
  executable: kimi
  args: []
  default_tool_params: {}
  metadata:
    tool_params: {}
  env_injection:
    mode: export_from_env_file
setup_projection:
  destination: .
skills_projection:
  destination: skills
  mode: symlink
auth_projection:
  files_dir: files
  file_mappings:
    - source: config.toml
      destination: config.toml
      mode: copy
      required: false
    - source: credentials
      destination: credentials
      mode: copy
      required: false
    - source: credentials/kimi-code.json
      destination: credentials/kimi-code.json
      mode: copy
      required: false
  env:
    source: env/vars.env
    allowlist:
      - KIMI_MODEL_NAME
      - KIMI_MODEL_API_KEY
      - KIMI_MODEL_PROVIDER_TYPE
      - KIMI_MODEL_BASE_URL
      - KIMI_MODEL_MAX_CONTEXT_SIZE
      - KIMI_MODEL_CAPABILITIES
      - KIMI_MODEL_DISPLAY_NAME
      - KIMI_MODEL_MAX_OUTPUT_SIZE
      - KIMI_MODEL_REASONING_KEY
      - KIMI_MODEL_DEFAULT_THINKING
      - KIMI_MODEL_THINKING_MODE
      - KIMI_MODEL_THINKING_EFFORT
      - KIMI_MODEL_ADAPTIVE_THINKING
      - KIMI_CODE_BASE_URL
      - KIMI_CODE_OAUTH_HOST
      - KIMI_OAUTH_HOST
      - KIMI_DISABLE_TELEMETRY
