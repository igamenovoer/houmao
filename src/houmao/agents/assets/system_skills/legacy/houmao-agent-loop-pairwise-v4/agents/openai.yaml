interface:
  display_name: "Houmao Agent Loop Tree V4"
  short_description: "Author, initialize, and operate template-driven workspace-aware enriched master-owned tree loop runs."
  default_prompt: "Use $houmao-agent-loop-pairwise-v4 only when the user explicitly requests it and needs to turn a goal or rich task note into a template-driven workspace-aware enriched tree loop plan written under a user-selected output directory, extract and preserve source constraints with policy-bearing verbs, fill strict generated document templates for `plan.md`, agent notes, reporting templates, bookkeeping templates, and `constraint-coverage-audit.md`, choose a `standard` or `custom` workspace contract, run canonical `initialize` through default precomputed routing-packet validation plus launch-profile mailbox-association precheck, launch-profile-backed participant launch when provided, fail-closed email/mailbox verification, baseline gateway mail-notifier verification or enablement, and run-owned memo materialization, or send compact memo-read `start` by mail by default unless the user explicitly requests direct prompt delivery, plus `peek`, `ping`, `pause`, `resume`, `recover_and_continue`, `stop`, or `hard-kill` control requests without making the user agent part of the execution loop."
