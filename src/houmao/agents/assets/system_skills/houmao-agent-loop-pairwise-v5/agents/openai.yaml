interface:
  display_name: "Houmao Agent Loop Pairwise"
  short_description: "Manually init, clarify, and refine loop intention material, generate execplans, and operate generated loops."
  default_prompt: "Use $houmao-agent-loop-pairwise-v5 only when the user explicitly requests it or names a supported loop operation. If the user invokes this skill without another operation or prompt, treat it as `init`: ask for the output `<loop-dir>` and scaffold editable `<loop-dir>/intention/` Markdown only after the user provides it. Also use this skill to clarify intent through decision questions and ADR capture, refine intention material, generate, validate, or regenerate generated `<loop-dir>/execplan/` contracts with `manifest.toml`, `specs/`, `skills/`, `agents/`, `harness/`, and `docs/`, or prepare, start, inspect, pause, resume, recover, or stop a generated loop while keeping the skill general, requiring a user-provided loop directory, treating intention as source and execplan as generated output, excluding required ADR discovery outside explicit clarify-intent work, defaulting workspace setup to Houmao in-repo style plus requested bookkeeping dirs, routing workspace creation through $houmao-utils-workspace-mgr, defaulting cross-agent participant communication to Houmao mail unless intention source chooses a non-mail mechanism, keeping generated execplans responsible for loop-specific mail semantics, and routing mailbox setup, ordinary mail operations, gateway-notified mail rounds, managed-agent communication routing, and gateway lifecycle through maintained Houmao mail skills."
