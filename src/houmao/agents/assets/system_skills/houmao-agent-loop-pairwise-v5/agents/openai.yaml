interface:
  display_name: "Houmao Agent Loop Pairwise"
  short_description: "Manually init loop intention, clarify intent, generate staged execplans, and operate generated loops."
  default_prompt: "Use $houmao-agent-loop-pairwise-v5 only when the user explicitly requests it or names a supported loop operation. If invoked without another operation or prompt, treat it as init: ask for the output loop directory and scaffold editable loop-dir/intention material only after the user provides it. Generate or update loop-dir/execplan from intention source using process-first stages: process specs, derived contracts, harness, skills, agent bindings, and final docs/manifest. Model mail-driven agents as notifier-prompt-driven: process mail, optionally run one bounded tick, then end the chat turn without in-chat waiting. Route workspace creation, mailbox work, gateway work, managed-agent lifecycle, memory, and inspection through maintained Houmao skills."
