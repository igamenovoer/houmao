interface:
  display_name: "Houmao Agent Loop Pairwise V5"
  short_description: "Manually create and clarify loop intention material, generate execplans, and operate generated v5 loops."
  default_prompt: "Use $houmao-agent-loop-pairwise-v5 only when the user explicitly requests it or names a v5 loop operation and needs to create editable `<loop-dir>/intention/` Markdown, clarify intent through decision questions and ADR capture, refine intention material, generate, validate, or regenerate generated `<loop-dir>/execplan/` contracts with `manifest.toml`, `specs/`, `skills/`, `agents/`, `harness/`, and `docs/`, or prepare, start, inspect, pause, resume, recover, or stop a generated v5 loop while keeping the skill general, requiring a user-provided loop directory, treating intention as source and execplan as generated output, excluding required ADR discovery outside explicit clarify-intent work, and routing platform work through maintained Houmao skills."
