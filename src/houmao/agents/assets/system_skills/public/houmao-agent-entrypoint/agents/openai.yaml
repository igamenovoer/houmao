interface:
  display_name: "Houmao Agent Entrypoint"
  short_description: "Route Houmao requests in a managed-agent session"
  default_prompt: "Use $houmao-agent-entrypoint for any semantically Houmao-related request in a genuine managed-agent context, including information, incomplete tasks, lifecycle work, and read-only runtime-variable, mindset, or private-workspace access. Answer informational requests locally without identity verification; verify self freshly before any operational route. Explicit $houmao-* handles take precedence."
policy:
  allow_implicit_invocation: true
