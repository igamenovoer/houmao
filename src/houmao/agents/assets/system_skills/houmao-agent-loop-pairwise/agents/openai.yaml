interface:
  display_name: "Houmao Agent Loop Pairwise"
  short_description: "Author, initialize, and operate master-owned pairwise loop runs."
  default_prompt: "Use $houmao-agent-loop-pairwise when a user-controlled agent needs to turn a goal into a pairwise loop plan, run canonical `initialize`, or send `start`, `peek`, `ping`, `pause`, `resume`, or `stop` control requests to a designated Houmao master without making the user agent part of the execution loop."
